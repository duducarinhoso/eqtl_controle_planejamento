<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controle de Solicitações · EQTL</title>

  <!-- Anti-flash do zoom da UI (alta densidade): aplica antes do 1o paint.
       Faixa/chave/default DUPLICADOS de js/uizoom.js — manter em sincronia. -->
  <script>
    try {
      var z = parseFloat(localStorage.getItem("eqtl-ui-zoom"));
      if (!(z >= 0.7 && z <= 1.2)) z = 0.8;   // default denso (padrão Cronograma)
      var r = document.documentElement.style;
      r.setProperty("zoom", z);
      r.setProperty("--app-zoom", z);          // alimenta --app-vh (evita tela cortada)
    } catch (e) {}
  </script>

  <!-- Fontes do design system -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Design System v2 (modelos/design-system_v2.html) — CSS verbatim do modelo -->
  <!-- ?v=N = numero de versao para cache. Ao publicar mudancas, suba o N (mesmo numero em todos abaixo + no importmap/app.js). -->
  <link rel="stylesheet" href="styles/design-system.css?v=43" />

  <link rel="stylesheet" href="styles/tokens.css?v=43" />
  <link rel="stylesheet" href="styles/app.css?v=43" />
  <link rel="stylesheet" href="styles/login.css?v=43" />
  <link rel="stylesheet" href="styles/home.css?v=43" />
  <link rel="stylesheet" href="styles/app-ds.css?v=43" />
  <link rel="stylesheet" href="styles/solic.css?v=43" />
  <link rel="stylesheet" href="styles/datagrid.css?v=43" />
  <link rel="stylesheet" href="styles/dashboard.css?v=43" />
</head>
<body>
  <!-- estado de carregamento inicial -->
  <div id="boot" class="center-screen"><div class="spinner"></div></div>

  <!-- raiz da tela de autenticacao -->
  <div id="auth-root" hidden></div>

  <!-- raiz da aplicacao -->
  <div id="app-root" hidden></div>

  <!-- carrega config (copie config.example.js -> config.js) -->
  <script src="config.js?v=43"></script>
  <!-- Chart.js + JS do modelo (charts/gauges/sparklines/sidebar/tema) verbatim -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script defer src="js/ds.js?v=43"></script>

  <!-- Cache-busting de TODOS os modulos JS num so lugar. O app.js importa estes
       arquivos sem ?v=; o importmap reescreve cada um para a versao carimbada.
       AO PUBLICAR UMA MUDANCA: troque o numero 19 por 20 (aqui, nos <link> acima,
       no config.js/ds.js e no app.js abaixo). O navegador de todos baixa de novo. -->
  <script type="importmap">
  {
    "imports": {
      "./js/supabase.js": "./js/supabase.js?v=43",
      "./js/auth.js": "./js/auth.js?v=43",
      "./js/store.js": "./js/store.js?v=43",
      "./js/grid.js": "./js/grid.js?v=43",
      "./js/realtime.js": "./js/realtime.js?v=43",
      "./js/excel.js": "./js/excel.js?v=43",
      "./js/parser.js": "./js/parser.js?v=43",
      "./js/solic.js": "./js/solic.js?v=43",
      "./js/planning.js": "./js/planning.js?v=43",
      "./js/table_import.js": "./js/table_import.js?v=43",
      "./js/datagrid.js": "./js/datagrid.js?v=43",
      "./js/listview.js": "./js/listview.js?v=43",
      "./js/calc.js": "./js/calc.js?v=43",
      "./js/uizoom.js": "./js/uizoom.js?v=43",
      "./js/zoomctl.js": "./js/zoomctl.js?v=43",
      "./js/dashboard.js": "./js/dashboard.js?v=43",
      "./js/present.js": "./js/present.js?v=43",
      "./js/util.js": "./js/util.js?v=43"
    }
  }
  </script>
  <!-- ponto de entrada -->
  <script type="module" src="js/app.js?v=43"></script>
</body>
</html>
