<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#08080d" />
  <meta name="description" content="Tela de login responsiva inspirada em um layout editorial contemporâneo." />
  <title>Cogie — Entrar</title>

  <style>
    :root {
      color-scheme: light;
      --ink: #111114;
      --muted: #74747f;
      --line: #e7e7ec;
      --field: #f6f7f9;
      --white: #ffffff;
      --danger: #cb2b44;
      --success: #177c4c;
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 13px;
      --shadow: 0 38px 95px rgba(0, 0, 0, .42);
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; background: #08080d; }

    body {
      min-height: 100svh;
      margin: 0;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 13% 12%, rgba(255, 0, 130, .22), transparent 29%),
        radial-gradient(circle at 88% 84%, rgba(72, 31, 255, .25), transparent 30%),
        linear-gradient(135deg, #050508 0%, #090914 45%, #020206 100%);
    }

    button, input { font: inherit; }
    button, a, input, label { -webkit-tap-highlight-color: transparent; }
    a { color: inherit; }

    .page {
      position: relative;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 44px);
      isolation: isolate;
    }

    /* Fundo abstrato feito apenas com CSS: nenhuma imagem é utilizada. */
    .ambient,
    .ambient::before,
    .ambient::after {
      position: absolute;
      inset: -15%;
      pointer-events: none;
      z-index: -2;
    }

    .ambient {
      overflow: hidden;
      filter: saturate(1.15);
    }

    .ambient::before {
      content: "";
      left: -18%;
      top: -30%;
      width: 88%;
      height: 122%;
      border-radius: 44% 56% 55% 45% / 42% 44% 56% 58%;
      background:
        repeating-linear-gradient(
          164deg,
          transparent 0 18px,
          rgba(255, 255, 255, .16) 20px,
          transparent 23px 44px
        ),
        radial-gradient(ellipse at 56% 54%, rgba(61, 201, 255, .94) 0 4%, rgba(24, 78, 255, .88) 10%, transparent 30%),
        radial-gradient(ellipse at 50% 27%, rgba(255, 70, 170, .94) 0 9%, rgba(248, 0, 97, .76) 27%, transparent 49%),
        conic-gradient(from 215deg at 62% 45%, #18002d, #8a0064, #ff1178, #3f13dc, #08afff, #10001c, #18002d);
      transform: rotate(-9deg) skewY(-8deg);
      filter: blur(1px) drop-shadow(0 0 34px rgba(236, 0, 134, .35));
      animation: driftLeft 14s ease-in-out infinite alternate;
      opacity: .95;
    }

    .ambient::after {
      content: "";
      left: 52%;
      top: 56%;
      width: 70%;
      height: 70%;
      border-radius: 50% 39% 45% 54% / 44% 42% 58% 56%;
      background:
        repeating-linear-gradient(22deg, transparent 0 20px, rgba(255,255,255,.14) 22px, transparent 25px 42px),
        conic-gradient(from 100deg at 50% 44%, #18002d, #5d10ef, #00a7ff, #de007d, #ff2144, #18002d);
      transform: rotate(12deg) skewX(-10deg);
      filter: blur(2px) drop-shadow(0 0 38px rgba(81, 44, 255, .4));
      animation: driftRight 16s ease-in-out infinite alternate;
      opacity: .9;
    }

    @keyframes driftLeft {
      from { transform: translate3d(-2%, -1%, 0) rotate(-9deg) skewY(-8deg) scale(1); }
      to   { transform: translate3d(4%, 3%, 0) rotate(-5deg) skewY(-10deg) scale(1.06); }
    }

    @keyframes driftRight {
      from { transform: translate3d(2%, 1%, 0) rotate(12deg) skewX(-10deg) scale(1); }
      to   { transform: translate3d(-5%, -4%, 0) rotate(7deg) skewX(-7deg) scale(1.08); }
    }

    .login-shell {
      width: min(1180px, 100%);
      min-height: min(770px, calc(100svh - clamp(36px, 8vw, 88px)));
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      border: 6px solid rgba(255,255,255,.96);
      border-radius: var(--radius-xl);
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .showcase {
      position: relative;
      min-height: 640px;
      overflow: hidden;
      padding: clamp(30px, 4.2vw, 55px);
      color: var(--white);
      background:
        radial-gradient(ellipse at 87% 56%, rgba(8, 188, 255, .85) 0 3%, transparent 17%),
        radial-gradient(ellipse at 43% 24%, rgba(255, 25, 150, .92) 0 9%, transparent 31%),
        radial-gradient(ellipse at 50% 68%, rgba(45, 25, 255, .82) 0 8%, transparent 33%),
        linear-gradient(145deg, #17001e 0%, #74005e 24%, #ff145e 40%, #3010bf 63%, #040014 87%);
      isolation: isolate;
    }

    .showcase::before,
    .showcase::after {
      content: "";
      position: absolute;
      z-index: -1;
      pointer-events: none;
    }

    .showcase::before {
      inset: -16% -34% 22% -40%;
      border-radius: 49% 51% 42% 58% / 56% 37% 63% 44%;
      background:
        repeating-linear-gradient(170deg, transparent 0 17px, rgba(255,255,255,.22) 19px, transparent 22px 39px),
        conic-gradient(from 217deg at 60% 45%, #08000d, #7b0068, #ff137e, #ff2f61, #3c12da, #08c7ff, #090017);
      transform: rotate(-8deg) skewY(-7deg);
      filter: contrast(1.08) saturate(1.18);
      animation: showcaseWave 12s ease-in-out infinite alternate;
    }

    .showcase::after {
      left: -25%;
      right: -36%;
      bottom: -24%;
      height: 53%;
      border-radius: 46% 54% 0 0 / 72% 63% 0 0;
      background:
        repeating-linear-gradient(10deg, transparent 0 16px, rgba(255,255,255,.12) 18px, transparent 21px 41px),
        linear-gradient(155deg, #02020b 7%, #140035 31%, #4a11d3 54%, #0b6dc7 69%, #02020a 95%);
      transform: rotate(6deg) skewX(-12deg);
      animation: showcaseWaveBottom 14s ease-in-out infinite alternate;
    }

    @keyframes showcaseWave {
      from { transform: translate3d(-1%, -2%, 0) rotate(-8deg) skewY(-7deg) scale(1.02); }
      to   { transform: translate3d(4%, 3%, 0) rotate(-3deg) skewY(-10deg) scale(1.08); }
    }

    @keyframes showcaseWaveBottom {
      from { transform: translate3d(-3%, 1%, 0) rotate(6deg) skewX(-12deg) scale(1); }
      to   { transform: translate3d(3%, -4%, 0) rotate(2deg) skewX(-8deg) scale(1.07); }
    }

    .quote-mark {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .27em;
      text-transform: uppercase;
    }

    .quote-mark::after {
      content: "";
      width: 116px;
      height: 1px;
      background: rgba(255,255,255,.82);
    }

    .showcase-copy {
      position: absolute;
      left: clamp(30px, 4.2vw, 55px);
      right: clamp(30px, 4.2vw, 55px);
      bottom: clamp(32px, 5.3vw, 68px);
      max-width: 430px;
    }

    .showcase h2 {
      margin: 0 0 18px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(48px, 5.2vw, 74px);
      font-weight: 400;
      line-height: .91;
      letter-spacing: -.045em;
      text-wrap: balance;
    }

    .showcase p {
      max-width: 355px;
      margin: 0;
      color: rgba(255,255,255,.82);
      font-size: 13px;
      line-height: 1.7;
    }

    .login-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: clamp(28px, 4.8vw, 62px) clamp(30px, 6vw, 84px) clamp(26px, 4vw, 48px);
      background: rgba(255,255,255,.985);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      align-self: center;
      gap: 10px;
      color: #151519;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.03em;
    }

    .brand-mark {
      width: 21px;
      height: 21px;
      display: grid;
      place-items: center;
    }

    .brand-mark svg { width: 100%; height: 100%; }

    .form-wrap {
      width: min(100%, 390px);
      margin: auto;
    }

    .heading {
      margin-bottom: 40px;
      text-align: center;
    }

    .heading h1 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(38px, 4vw, 52px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -.052em;
    }

    .heading p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .field { margin-bottom: 21px; }

    .field-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 9px;
    }

    .field label {
      font-size: 12px;
      font-weight: 650;
      color: #222229;
    }

    .error-text {
      min-height: 14px;
      color: var(--danger);
      font-size: 11px;
      text-align: right;
    }

    .control {
      position: relative;
    }

    .control input {
      width: 100%;
      height: 49px;
      padding: 0 15px;
      border: 1px solid transparent;
      border-radius: 10px;
      outline: none;
      background: var(--field);
      color: #1d1d22;
      font-size: 13px;
      box-shadow: 0 1px 1px rgba(22,22,31,.02), inset 0 0 0 1px rgba(29,29,35,.015);
      transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .control input::placeholder { color: #a0a0aa; }

    .control input:hover { background: #f2f3f6; }

    .control input:focus {
      border-color: #b9b9c2;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(20,20,25,.06);
    }

    .control input[aria-invalid="true"] {
      border-color: rgba(203,43,68,.7);
      background: #fff9fa;
    }

    .password-input { padding-right: 48px !important; }

    .icon-button {
      position: absolute;
      top: 50%;
      right: 10px;
      width: 34px;
      height: 34px;
      padding: 0;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #6e6e78;
      cursor: pointer;
    }

    .icon-button:hover { background: rgba(0,0,0,.05); color: #17171b; }
    .icon-button:focus-visible { outline: 2px solid #111; outline-offset: 2px; }
    .icon-button svg { width: 18px; height: 18px; }

    .form-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin: -1px 0 29px;
      font-size: 12px;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #55555e;
      cursor: pointer;
      user-select: none;
    }

    .check input {
      appearance: none;
      width: 15px;
      height: 15px;
      margin: 0;
      display: grid;
      place-items: center;
      border: 1px solid #cfcfd6;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }

    .check input::after {
      content: "";
      width: 7px;
      height: 4px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: translateY(-1px) rotate(-45deg) scale(0);
      transition: transform .12s ease;
    }

    .check input:checked { border-color: #111114; background: #111114; }
    .check input:checked::after { transform: translateY(-1px) rotate(-45deg) scale(1); }
    .check input:focus-visible { outline: 2px solid #111; outline-offset: 2px; }

    .text-link {
      color: #202026;
      font-weight: 650;
      text-decoration: none;
    }

    .text-link:hover { text-decoration: underline; text-underline-offset: 3px; }
    .text-link:focus-visible { outline: 2px solid #111; outline-offset: 3px; border-radius: 2px; }

    .btn {
      position: relative;
      width: 100%;
      height: 49px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
    }

    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: 2px solid #111; outline-offset: 3px; }

    .btn-primary {
      border: 1px solid #070708;
      background: #070708;
      color: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,.15);
    }

    .btn-primary:hover {
      background: #1b1b20;
      box-shadow: 0 13px 28px rgba(0,0,0,.22);
      transform: translateY(-1px);
    }

    .btn-primary[aria-busy="true"] { cursor: wait; }

    .spinner {
      width: 15px;
      height: 15px;
      display: none;
      border: 2px solid rgba(255,255,255,.38);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .btn-primary[aria-busy="true"] .spinner { display: block; }
    .btn-primary[aria-busy="true"] .btn-label { opacity: .8; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin: 19px 0;
      color: #9b9ba4;
      font-size: 11px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    .btn-google {
      border: 1px solid var(--line);
      background: #fff;
      color: #25252b;
      box-shadow: 0 2px 8px rgba(20,20,25,.025);
    }

    .btn-google:hover {
      border-color: #d6d6dc;
      background: #fafafa;
      transform: translateY(-1px);
    }

    .google-icon { width: 18px; height: 18px; flex: 0 0 auto; }

    .signup {
      margin-top: auto;
      padding-top: 34px;
      color: #676771;
      font-size: 12px;
      text-align: center;
    }

    .signup .text-link { margin-left: 3px; }

    .status-toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 20;
      max-width: min(420px, calc(100% - 32px));
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(16,16,20,.94);
      color: #fff;
      font-size: 12px;
      line-height: 1.45;
      box-shadow: 0 18px 38px rgba(0,0,0,.3);
      opacity: 0;
      transform: translate(-50%, 15px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .status-toast.is-visible { opacity: 1; transform: translate(-50%, 0); }
    .status-toast[data-type="success"] { background: rgba(23,124,76,.96); }
    .status-toast[data-type="error"] { background: rgba(174,34,56,.96); }

    @media (max-width: 900px) {
      .page { padding: 20px; }
      .login-shell { grid-template-columns: 42% 58%; min-height: min(720px, calc(100svh - 40px)); }
      .showcase { min-height: 620px; padding: 30px; }
      .showcase h2 { font-size: clamp(42px, 7vw, 58px); }
      .showcase-copy { left: 30px; right: 30px; bottom: 42px; }
      .login-panel { padding-inline: clamp(28px, 6vw, 54px); }
    }

    @media (max-width: 700px) {
      body { overflow-y: auto; }
      .page { display: block; padding: 14px; }
      .login-shell {
        width: 100%;
        min-height: calc(100svh - 28px);
        grid-template-columns: 1fr;
        border-width: 4px;
        border-radius: 25px;
      }
      .showcase {
        min-height: 220px;
        padding: 24px;
        border-radius: 20px 20px 0 0;
      }
      .quote-mark { font-size: 9px; }
      .quote-mark::after { width: 70px; }
      .showcase-copy { position: absolute; left: 24px; right: 24px; bottom: 24px; max-width: 360px; }
      .showcase h2 { margin-bottom: 10px; font-size: clamp(34px, 10vw, 49px); line-height: .92; }
      .showcase p { display: none; }
      .login-panel { min-height: 560px; padding: 26px 28px 24px; }
      .brand { margin-bottom: 45px; }
      .form-wrap { margin: 0 auto; }
      .heading { margin-bottom: 32px; }
      .heading h1 { font-size: 40px; }
      .signup { padding-top: 36px; }
    }

    @media (max-width: 420px) {
      .login-panel { padding-inline: 20px; }
      .form-meta { align-items: flex-start; }
      .heading h1 { font-size: 36px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="ambient" aria-hidden="true"></div>

    <section class="login-shell" aria-label="Área de autenticação">
      <aside class="showcase" aria-label="Mensagem de boas-vindas">
        <div class="quote-mark">Uma boa ideia</div>

        <div class="showcase-copy">
          <h2>Conquiste tudo o que deseja</h2>
          <p>Grandes resultados começam com consistência, foco e uma boa experiência em cada detalhe.</p>
        </div>
      </aside>

      <section class="login-panel">
        <a class="brand" href="#" aria-label="Página inicial da Cogie">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 12c2.2-3.2 5-4.8 8-4.8S17.8 8.8 20 12c-2.2 3.2-5 4.8-8 4.8S6.2 15.2 4 12Z" stroke="currentColor" stroke-width="1.45"/>
              <path d="M6.4 8.2C8 5.9 9.8 4.8 12 4.8s4 1.1 5.6 3.4M6.4 15.8C8 18.1 9.8 19.2 12 19.2s4-1.1 5.6-3.4" stroke="currentColor" stroke-width="1.45" stroke-linecap="round"/>
              <circle cx="12" cy="12" r="2.1" fill="currentColor"/>
            </svg>
          </span>
          <span>Cogie</span>
        </a>

        <div class="form-wrap">
          <header class="heading">
            <h1>Bem-vindo de volta</h1>
            <p>Use seu e-mail e senha para acessar sua conta.</p>
          </header>

          <form id="loginForm" novalidate>
            <div class="field">
              <div class="field-head">
                <label for="email">E-mail</label>
                <span class="error-text" id="emailError" aria-live="polite"></span>
              </div>
              <div class="control">
                <input
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  inputmode="email"
                  placeholder="voce@empresa.com"
                  required
                  aria-describedby="emailError"
                />
              </div>
            </div>

            <div class="field">
              <div class="field-head">
                <label for="password">Senha</label>
                <span class="error-text" id="passwordError" aria-live="polite"></span>
              </div>
              <div class="control">
                <input
                  class="password-input"
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="Digite sua senha"
                  minlength="6"
                  required
                  aria-describedby="passwordError"
                />
                <button class="icon-button" id="togglePassword" type="button" aria-label="Mostrar senha" aria-pressed="false">
                  <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M2.8 12s3.2-5 9.2-5 9.2 5 9.2 5-3.2 5-9.2 5-9.2-5-9.2-5Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="2.4" stroke="currentColor" stroke-width="1.7"/>
                  </svg>
                  <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" aria-hidden="true" hidden>
                    <path d="m4 4 16 16M10.6 7.1c.45-.07.92-.1 1.4-.1 6 0 9.2 5 9.2 5a14.8 14.8 0 0 1-2.7 3.2M7.2 8.2C4.3 9.5 2.8 12 2.8 12s3.2 5 9.2 5c1 0 1.9-.14 2.7-.38M9.9 9.9a3 3 0 0 0 4.2 4.2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-meta">
              <label class="check" for="remember">
                <input id="remember" name="remember" type="checkbox" />
                <span>Lembrar de mim</span>
              </label>
              <a class="text-link" href="#recuperar">Esqueci minha senha</a>
            </div>

            <button class="btn btn-primary" id="submitButton" type="submit" aria-busy="false">
              <span class="spinner" aria-hidden="true"></span>
              <span class="btn-label">Entrar</span>
            </button>

            <div class="divider" aria-hidden="true">ou continue com</div>

            <button class="btn btn-google" id="googleButton" type="button">
              <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#4285F4" d="M21.6 12.23c0-.71-.06-1.4-.2-2.07H12v3.92h5.38a4.6 4.6 0 0 1-2 3.02v2.55h3.24c1.9-1.75 2.98-4.33 2.98-7.42Z"/>
                <path fill="#34A853" d="M12 22c2.7 0 4.97-.9 6.62-2.35l-3.24-2.55c-.9.6-2.05.96-3.38.96-2.61 0-4.82-1.76-5.61-4.13H3.04v2.63A10 10 0 0 0 12 22Z"/>
                <path fill="#FBBC05" d="M6.39 13.93A6.02 6.02 0 0 1 6.08 12c0-.67.11-1.32.31-1.93V7.44H3.04A10 10 0 0 0 2 12c0 1.61.38 3.13 1.04 4.56l3.35-2.63Z"/>
                <path fill="#EA4335" d="M12 5.94c1.47 0 2.78.5 3.82 1.5l2.87-2.87A9.64 9.64 0 0 0 12 2a10 10 0 0 0-8.96 5.44l3.35 2.63C7.18 7.7 9.39 5.94 12 5.94Z"/>
              </svg>
              <span>Entrar com Google</span>
            </button>
          </form>
        </div>

        <p class="signup">Ainda não tem uma conta?<a class="text-link" href="#cadastro">Criar conta</a></p>
      </section>
    </section>

    <div class="status-toast" id="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    (() => {
      const form = document.querySelector('#loginForm');
      const email = document.querySelector('#email');
      const password = document.querySelector('#password');
      const emailError = document.querySelector('#emailError');
      const passwordError = document.querySelector('#passwordError');
      const submitButton = document.querySelector('#submitButton');
      const togglePassword = document.querySelector('#togglePassword');
      const eyeOpen = document.querySelector('#eyeOpen');
      const eyeClosed = document.querySelector('#eyeClosed');
      const googleButton = document.querySelector('#googleButton');
      const toast = document.querySelector('#toast');

      const showToast = (message, type = 'default') => {
        toast.textContent = message;
        toast.dataset.type = type;
        toast.classList.add('is-visible');
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove('is-visible'), 3200);
      };

      const setError = (input, errorElement, message = '') => {
        input.setAttribute('aria-invalid', message ? 'true' : 'false');
        errorElement.textContent = message;
      };

      const validateEmail = () => {
        const value = email.value.trim();
        if (!value) {
          setError(email, emailError, 'Informe seu e-mail.');
          return false;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
          setError(email, emailError, 'E-mail inválido.');
          return false;
        }
        setError(email, emailError);
        return true;
      };

      const validatePassword = () => {
        if (!password.value) {
          setError(password, passwordError, 'Informe sua senha.');
          return false;
        }
        if (password.value.length < 6) {
          setError(password, passwordError, 'Mínimo de 6 caracteres.');
          return false;
        }
        setError(password, passwordError);
        return true;
      };

      email.addEventListener('blur', validateEmail);
      password.addEventListener('blur', validatePassword);
      email.addEventListener('input', () => emailError.textContent && validateEmail());
      password.addEventListener('input', () => passwordError.textContent && validatePassword());

      togglePassword.addEventListener('click', () => {
        const isHidden = password.type === 'password';
        password.type = isHidden ? 'text' : 'password';
        togglePassword.setAttribute('aria-pressed', String(isHidden));
        togglePassword.setAttribute('aria-label', isHidden ? 'Ocultar senha' : 'Mostrar senha');
        eyeOpen.hidden = isHidden;
        eyeClosed.hidden = !isHidden;
        password.focus({ preventScroll: true });
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const isValid = validateEmail() & validatePassword();
        if (!isValid) {
          (email.getAttribute('aria-invalid') === 'true' ? email : password).focus();
          return;
        }

        submitButton.disabled = true;
        submitButton.setAttribute('aria-busy', 'true');

        // Substitua este atraso por sua chamada de API/fetch.
        await new Promise(resolve => setTimeout(resolve, 900));

        submitButton.disabled = false;
        submitButton.setAttribute('aria-busy', 'false');
        showToast('Login validado. Conecte aqui a API do seu sistema.', 'success');
      });

      googleButton.addEventListener('click', () => {
        showToast('Conecte este botão ao OAuth do Google.', 'default');
      });

      document.querySelectorAll('a[href^="#"]').forEach(link => {
        link.addEventListener('click', event => {
          const target = link.getAttribute('href');
          if (target === '#') event.preventDefault();
          if (target === '#recuperar') {
            event.preventDefault();
            showToast('Aqui você pode abrir o fluxo de recuperação de senha.');
          }
          if (target === '#cadastro') {
            event.preventDefault();
            showToast('Aqui você pode direcionar para a tela de cadastro.');
          }
        });
      });
    })();
  </script>
</body>
</html>
